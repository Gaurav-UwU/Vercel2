<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>100 Reasons Why I Love You 💙</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,40,80,0.65);
z-index:-1;
}

.container{
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
background:#1e90ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0c7cd5;
}

#reason{
font-size:22px;
margin-top:25px;
min-height:60px;
}

.counter{
margin-top:10px;
opacity:0.8;
}

.heart{
position:absolute;
color:#7ecbff;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

#game{
display:none;
margin-top:150px;
}

#noBtn{
position:absolute;
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
justify-content:center;
align-items:center;
flex-direction:column;
font-size:26px;
}

</style>
</head>

<body>

<img src="photo.jpeg" id="bg">
<div class="overlay"></div>

<div id="main" class="container">

<h1>💙 100 Reasons Why I Love You</h1>

<button onclick="showReason()">Click for a reason</button>

<p id="reason"></p>

<div class="counter">
Clicks: <span id="count">0</span>/100
</div>

</div>

<div id="game">

<h1>Do you love me? 💙</h1>

<button onclick="yesClicked()">YES 💙</button>
<button id="noBtn">NO</button>

</div>

<div id="final">

<h1>💙 I knew it! 💙</h1>

<p>
You are the best thing that ever happened to me.<br><br>
I’m so lucky to have you in my life.<br><br>
I love you 💙
</p>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

function showReason(){

if(!started){
document.getElementById("music").play()
started=true
}

const random=reasons[Math.floor(Math.random()*reasons.length)]

document.getElementById("reason").innerText=random

clicks++

document.getElementById("count").innerText=clicks

if(clicks>=100){
document.getElementById("main").style.display="none"
document.getElementById("game").style.display="block"
}

}

function yesClicked(){
document.getElementById("game").style.display="none"
document.getElementById("final").style.display="flex"
}

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{
const x=Math.random()*window.innerWidth
const y=Math.random()*window.innerHeight
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"
})

function heart(){

const h=document.createElement("div")
h.className="heart"
h.innerHTML="💙"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(Math.random()*20+10)+"px"
h.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},6000)

}

setInterval(heart,500)

</script>

</body>
</html>
