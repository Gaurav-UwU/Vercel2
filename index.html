<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>100 Reasons Why I Love You 💙</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,40,80,0.6);
z-index:-1;
}

.container{
margin-top:120px;
padding:30px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
background:#1e90ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0c7cd5;
}

#reason{
font-size:22px;
margin-top:25px;
min-height:60px;
}

.heart{
position:absolute;
color:#7ecbff;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

#surprise{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>
</head>

<body>

<img src="photo.jpeg" id="bg">
<div class="overlay"></div>

<div class="container" id="main">

<h1>💙 100 Reasons Why I Love You</h1>

<button onclick="showReason()">Click for a reason</button>

<p id="reason"></p>

</div>

<div id="surprise">

<h1>💙 Final Reason</h1>

<h2>
Because you are the best thing that ever happened to me.
<br><br>
I’m so lucky to have you in my life.
<br><br>
I love you 💙
</h2>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let started=false
let clicks=0

const reasons=[

"Because your smile fixes my worst days",
"Because your laugh makes everything better",
"Because you believe in me",
"Because your hugs feel like home",
"Because you understand me",
"Because you make ordinary days special",
"Because you inspire me",
"Because you are kind",
"Because you are beautiful inside and out",
"Because you care about people",
"Because you support my dreams",
"Because you make life exciting",
"Because you brighten my darkest days",
"Because you make me laugh",
"Because you are thoughtful",
"Because you listen to me",
"Because you make memories unforgettable",
"Because you make my heart calm",
"Because you make everything feel easier",
"Because you make my world brighter",
"Because you are genuine",
"Because you are patient",
"Because you make love feel simple",
"Because you are my safe place",
"Because you inspire me to be better",
"Because you make me happy",
"Because you make every moment meaningful",
"Because you are caring",
"Because you always try to understand",
"Because you make life beautiful",
"Because you are my best friend",
"Because you are strong",
"Because you make my heart race",
"Because you make the future exciting",
"Because you bring peace to my mind",
"Because you make every place feel like home",
"Because you make me feel lucky",
"Because you make my life better",
"Because you are amazing",
"Because you make me smile without trying",
"Because you are unique",
"Because you are warm-hearted",
"Because you are thoughtful",
"Because you inspire kindness",
"Because you are supportive",
"Because you make my world complete",
"Because you make me believe in love",
"Because you make life worth sharing",
"Because you are special",
"Because you are you 💙"

]

function showReason(){

if(!started){
document.getElementById("music").play()
started=true
}

const random=reasons[Math.floor(Math.random()*reasons.length)]

document.getElementById("reason").innerText=random

clicks++

if(clicks>=20){
document.getElementById("main").style.display="none"
document.getElementById("surprise").style.display="flex"
}

}

function heart(){

const h=document.createElement("div")
h.className="heart"
h.innerHTML="💙"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(Math.random()*20+10)+"px"
h.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},6000)

}

setInterval(heart,500)

</script>

</body>
</html>
